services:
  postgres:
    image: postgres:16-alpine
    container_name: mailflow-postgres
    environment:
      POSTGRES_USER: mailflow
      POSTGRES_PASSWORD: mailflow
      POSTGRES_DB: mailflow_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mailflow-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
